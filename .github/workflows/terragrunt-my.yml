name: "Terragrunt (my)"

on:
  push:
    paths:
      - "private26/myterragrunt/**"

permissions:
  id-token: write
  contents: read

jobs:
  plan-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::890387921239:role/gh-actions-tf
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 1.1.0

      - name: Terragrunt Format Check
        working-directory: private26/myterragrunt/dev
        run: terragrunt hcl format --check

      - name: Terragrunt Plan (all dev stacks)
        working-directory: private26/myterragrunt/dev
        run: terragrunt run --all --non-interactive -- plan -no-color -input=false

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost Breakdown (dev)
        working-directory: private26/myterragrunt/dev
        run: |
          infracost breakdown --path=. --format=table | tee infracost.txt
          {
            echo "### Infracost: dev"
            echo '```'
            cat infracost.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  plan-network:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::705061159758:role/gh-actions-tf
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 1.1.0

      - name: Terragrunt Format Check
        working-directory: private26/myterragrunt/network
        run: terragrunt hcl format --check

      - name: Terragrunt Plan (all network stacks)
        working-directory: private26/myterragrunt/network
        run: terragrunt run --all --non-interactive -- plan -no-color -input=false

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost Breakdown (network)
        working-directory: private26/myterragrunt/network
        run: |
          infracost breakdown --path=. --format=table | tee infracost.txt
          {
            echo "### Infracost: network"
            echo '```'
            cat infracost.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  apply-dev:
    needs: plan-dev
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::890387921239:role/gh-actions-tf
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 1.1.0

      - name: Terragrunt Apply (all dev stacks)
        working-directory: private26/myterragrunt/dev
        run: terragrunt run --all --non-interactive -- apply -input=false

  apply-network:
    needs: plan-network
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::705061159758:role/gh-actions-tf
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 1.1.0

      - name: Terragrunt Apply (all network stacks)
        working-directory: private26/myterragrunt/network
        run: terragrunt run --all --non-interactive -- apply -input=false
