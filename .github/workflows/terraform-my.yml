name: "Terraform (my)"

on:
  push:
    paths:
      - "private26/my/**"

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.set-matrix.outputs.stacks }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: private26/my/**

      - name: Build stack matrix
        id: set-matrix
        run: |
          echo "${{ steps.changed-files.outputs.all_changed_files }}" \
            | tr ' ' '\n' \
            | grep -oE '^private26/my/[^/]+/stacks/[^/]+' \
            | sort -u \
            | jq -R -s -c 'split("\n")[:-1]' > stacks.json
          echo "stacks=$(cat stacks.json)" >> "$GITHUB_OUTPUT"
          cat stacks.json

  plan:
    needs: detect-changes
    if: needs.detect-changes.outputs.stacks != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.detect-changes.outputs.stacks) }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::890387921239:role/gh-actions-tf
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform Format Check
        working-directory: ${{ matrix.stack }}
        run: terraform fmt -check -diff

      - name: Terraform Init
        working-directory: ${{ matrix.stack }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ matrix.stack }}
        run: terraform plan -no-color -input=false

  apply:
    needs: [detect-changes, plan]
    if: needs.detect-changes.outputs.stacks != '[]'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.detect-changes.outputs.stacks) }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::890387921239:role/gh-actions-tf
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ matrix.stack }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ matrix.stack }}
        run: terraform apply -auto-approve -input=false
